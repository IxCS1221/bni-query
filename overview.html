<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BNI 長榮｜全員總表 / 多人比較</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body { font-family: -apple-system, "Noto Sans TC", sans-serif; }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #d1fae5;
      border-top-color: #065f46;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    table.sheet-table { border-collapse: collapse; white-space: nowrap; }
    table.sheet-table th, table.sheet-table td { border: 1px solid #e5e7eb; padding: 4px 8px; font-size: 12px; }
    table.sheet-table th { background: #f9fafb; color: #6b7280; font-weight: 600; position: sticky; top: 0; }
    table.sheet-table td.name-cell, table.sheet-table th.name-cell { position: sticky; left: 0; background: #fff; z-index: 1; text-align: left; }
    table.sheet-table th.name-cell { background: #f9fafb; z-index: 2; }
    table.sheet-table td { text-align: right; }
    .tab-btn.active { background: #065f46; color: #fff; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <div class="bg-gradient-to-b from-green-800 to-green-700 text-white text-center py-6 px-4 shadow">
    <p class="text-xs tracking-widest text-green-300 uppercase mb-1">BNI 長榮傳承組</p>
    <h1 id="header-title" class="text-xl font-bold tracking-wide">全員總表 / 多人比較</h1>
    <a href="index.html" class="inline-block mt-2 text-xs text-green-200 underline underline-offset-2 hover:text-white">🔍 回單人查詢</a>
  </div>

  <!-- Main -->
  <div class="max-w-full mx-auto px-3 mt-4 pb-32">

    <!-- Loading -->
    <div id="loading" class="flex flex-col items-center mt-12 text-gray-400">
      <div class="spinner"></div>
      <p class="mt-3 text-sm">資料載入中，請稍候…</p>
    </div>

    <!-- Error -->
    <div id="error" class="hidden text-center mt-12 text-red-400">
      <p class="text-3xl mb-2">⚠️</p>
      <p class="font-medium">資料載入失敗</p>
      <p class="text-sm mt-1">請確認試算表已開放公開，或稍後再試</p>
    </div>

    <!-- Content -->
    <div id="content" class="hidden max-w-5xl mx-auto">

      <!-- Tab 按鈕 -->
      <div class="flex gap-2 mb-3 flex-wrap">
        <button data-tab="raw" class="tab-btn px-3 py-2 rounded-full text-sm bg-white border border-gray-300 text-gray-600">📊 五個月 PALMS 數據</button>
        <button data-tab="light" class="tab-btn px-3 py-2 rounded-full text-sm bg-white border border-gray-300 text-gray-600">🚦 六個月燈號</button>
        <button data-tab="action" class="tab-btn px-3 py-2 rounded-full text-sm bg-white border border-gray-300 text-gray-600">📋 當月行動方案</button>
        <button id="download-table" class="ml-auto text-xs bg-white border border-gray-300 rounded-full px-4 py-2 text-gray-600 hover:bg-gray-100 shadow-sm">📷 下載目前表格</button>
      </div>

      <p id="tab-subtitle" class="text-xs text-gray-500 mb-2"></p>

      <div id="table-wrap" class="bg-white border border-gray-200 rounded-xl overflow-auto" style="max-height: 70vh;"></div>

      <!-- 比較結果 -->
      <div id="compare-section" class="hidden mt-8">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-bold text-gray-700">📋 比較結果</h2>
          <button id="download-compare" class="text-xs bg-white border border-gray-300 rounded-full px-4 py-2 text-gray-600 hover:bg-gray-100 shadow-sm">
            📷 下載比較圖片
          </button>
        </div>
        <div id="compare-cards" class="grid gap-4" style="grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));"></div>
      </div>

      <p class="text-center text-xs text-gray-400 mt-8 pb-2">資料每月由幹部更新 · BNI 長榮傳承組</p>
    </div>

  </div>

  <!-- 固定底部比較列 -->
  <div id="compare-bar" class="hidden fixed bottom-0 left-0 right-0 bg-green-800 text-white shadow-lg z-30">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <span class="text-sm">已選 <span id="selected-count" class="font-bold">0</span> 人</span>
      <div class="flex gap-2">
        <button id="clear-selection" class="text-xs px-3 py-2 rounded-full bg-green-900 hover:bg-green-950">清除</button>
        <button id="do-compare" class="text-xs px-4 py-2 rounded-full bg-white text-green-800 font-bold hover:bg-green-100">比較</button>
      </div>
    </div>
  </div>

  <script>
  // ── 設定 ──────────────────────────────────────────────────
  const MEMBER_CSV = 'https://docs.google.com/spreadsheets/d/1ec7niNZ67e_beYs-TysDCGYuEpU7TPlV_BJgJtySTK0/export?format=csv&gid=602629302';
  const BNI_CSV    = 'https://docs.google.com/spreadsheets/d/1FmbgTKX64uadHywzYtMQ8GUUb3eF-1_M2PKQvafCkX8/export?format=csv&gid=1798054740';

  let members = [];   // { id, name, norm }
  let bniMeta  = {};
  let people   = [];  // 整理過的全員資料
  let activeTab = 'raw';

  const norm = s => (s || '').replace(/[\s　]+/g, '').trim();
  // 有些人紅綠燈表姓名後面會多接英文暱稱（如「林敬達 Forest」），但會員名單姓名欄只有純中文，
  // 比對時要把這種後綴去掉再比，不然兩邊姓名對不起來、抓不到會員編號
  const stripNickname = s => (s || '').replace(/\s*[A-Za-z][A-Za-z\s]*$/, '').trim();
  const selected = new Set();

  // 逐字元掃描、正確處理跨行的引號欄位（試算表標頭如「總計\n週數」匯出成 CSV 會是
  // 跨兩行的引號欄位，先用 split('\n') 切行會把這種欄位切爛，所以整段文字一次掃）
  function parseCSV(text) {
    const rows = [];
    let row = [], cur = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') { cur += '"'; i++; }
          else inQuotes = false;
        } else {
          cur += c;
        }
      } else if (c === '"') {
        inQuotes = true;
      } else if (c === ',') {
        row.push(cur.trim()); cur = '';
      } else if (c === '\r') {
        // skip
      } else if (c === '\n') {
        row.push(cur.trim()); rows.push(row); row = []; cur = '';
      } else {
        cur += c;
      }
    }
    if (cur !== '' || row.length) { row.push(cur.trim()); rows.push(row); }
    return rows.filter(r => r.some(cell => cell !== ''));
  }

  // ── 燈號（四級標準：綠70+／黃50-65／紅30-45／黑25-）──────────
  function getLight(score) {
    if (score >= 70) return { key: 'green',  emoji: '🟢', label: '綠燈', cell: 'bg-green-100 text-green-800 font-bold' };
    if (score >= 50) return { key: 'yellow', emoji: '🟡', label: '黃燈', cell: 'bg-yellow-100 text-yellow-800 font-bold' };
    if (score >= 30) return { key: 'red',    emoji: '🔴', label: '紅燈', cell: 'bg-red-100 text-red-800 font-bold' };
    return              { key: 'black',  emoji: '⚫', label: '黑燈', cell: 'bg-gray-300 text-gray-800 font-bold' };
  }

  // ── 五個月 PALMS 原始數據欄位（C~O）──────────────────────
  const RAW_DEFS = [
    { label: '出席', col: 2 }, { label: '缺席', col: 3 }, { label: '遲到', col: 4 },
    { label: '病假', col: 5 }, { label: '代理', col: 6 }, { label: '內引', col: 7 },
    { label: '外引', col: 8 }, { label: '收內', col: 9 }, { label: '收外', col: 10 },
    { label: '來賓', col: 11 }, { label: '121', col: 12 },
    { label: '交易價值', col: 13, currency: true }, { label: '培訓', col: 14 },
  ];

  // ── 六個月燈號欄位（Q~AB）────────────────────────────────
  const LIGHT_DEFS = [
    { label: '出席', col: 2 }, { label: '總計週數', col: 16 }, { label: '來賓分母', col: 17 },
    { label: '引薦總和', col: 18 }, { label: '引薦週均', col: 19 },
    { label: '缺席分數', col: 21 }, { label: '引薦分數', col: 22 }, { label: '來賓分數', col: 23 },
    { label: '121分數', col: 24 }, { label: '交易價值分數', col: 25 }, { label: '教育分數', col: 26 },
  ];

  // ── 六項行動定義（AE~AK）───────────────────────────────
  const ACTION_DEFS = [
    { key: 'attend',  label: '出席',   col: 30 },
    { key: 'refer',   label: '引薦',   col: 31, unit: '件' },
    { key: 'guest',   label: '來賓',   col: 33, unit: '位' },
    { key: 'oneone',  label: '一對一', col: 34, unit: '次' },
    { key: 'value',   label: '交易價值', col: 35, unit: '元', currency: true },
    { key: 'edu',     label: '培訓',   col: 36, unit: '次' },
  ];

  function computeGaps(row) {
    const absent = parseFloat(row[3]) || 0;
    const late   = parseFloat(row[4]) || 0;
    const gaps = {};
    gaps.attend = (absent === 0 && late === 0)
      ? { ok: true, text: '✅ 出席達標' }
      : { ok: false, text: `⚠️ 缺席${absent}次${late ? '‧遲到' + late + '次' : ''}` };

    for (const def of ACTION_DEFS) {
      if (def.key === 'attend') continue;
      const raw = row[def.col];
      const v = (raw === '' || raw === undefined || raw === null) ? null : parseFloat(raw);
      if (v === null || v >= 0) {
        gaps[def.key] = { ok: true, text: `✅ ${def.label}達標` };
      } else {
        const absVal = Math.abs(v);
        const display = def.currency
          ? `NT$${Math.round(absVal).toLocaleString()}`
          : `${absVal % 1 === 0 ? absVal : absVal.toFixed(1)}${def.unit}`;
        gaps[def.key] = { ok: false, text: `🔴 缺${display}` };
      }
    }
    return gaps;
  }

  // ── 載入資料 ──────────────────────────────────────────────
  async function loadData() {
    try {
      const [mt, bt] = await Promise.all([
        fetch(MEMBER_CSV).then(r => { if (!r.ok) throw r; return r.text(); }),
        fetch(BNI_CSV).then(r => { if (!r.ok) throw r; return r.text(); }),
      ]);

      const mRows = parseCSV(mt);
      members = mRows.slice(1)
        .filter(r => r[3] === '會員' && r[1]?.trim() && r[2]?.trim())
        .map(r => ({ id: r[1].trim(), name: r[2].trim(), norm: norm(r[2]) }));

      const allRows = parseCSV(bt);
      const titleCell = allRows[0]?.[2] || '';
      bniMeta.rawTitle = titleCell;
      const mMatch = titleCell.match(/(\d{4}\.\d+)/);
      bniMeta.month = mMatch ? mMatch[1] : '';
      bniMeta.periodLabel = (allRows[1]?.[16] || '').replace(/\n/g, ' ');
      bniMeta.actionLabel = (allRows[1]?.[30] || '第六個月行動方案').replace(/\n/g, '');
      bniMeta.weeks = parseInt(allRows[2]?.[33]) || 0;
      bniMeta.rawPeriod = (allRows[3]?.[3] || '').replace(/\n/g, ' ');
      bniMeta.lightPeriod = (allRows[3]?.[16] || '').replace(/\n/g, ' ');

      const bniRows = allRows.slice(6).filter(r => {
        const n = norm(r[0]);
        return n && !n.includes('紅字') && !n.includes('不缺席');
      });

      people = bniRows.map(row => {
        const n = norm(row[0]);
        const m = members.find(mm => mm.norm === n)
          || members.find(mm => mm.norm === norm(stripNickname(row[0])));
        const totalWeeks = parseInt(row[16]) || 0;
        const score = parseFloat(row[27]) || 0;
        return {
          row,
          name: row[0],
          id: m ? m.id : '',
          totalWeeks,
          score,
          isNew: totalWeeks < 12,
          light: getLight(score),
          gaps: computeGaps(row),
        };
      });

      document.getElementById('header-title').textContent = bniMeta.rawTitle || '全員總表 / 多人比較';

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');
      renderTable();

    } catch (e) {
      console.error(e);
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
    }
  }

  // ── 表格渲染 ──────────────────────────────────────────────
  function fmtCell(raw, def) {
    if (raw === '' || raw === undefined || raw === null) return '—';
    if (def.currency) return `NT$${Math.round(parseFloat(raw) || 0).toLocaleString()}`;
    return raw;
  }

  function renderTable() {
    const wrap = document.getElementById('table-wrap');
    const subtitle = document.getElementById('tab-subtitle');
    let headCols = [], bodyFn;

    if (activeTab === 'raw') {
      subtitle.textContent = `五個月 PALMS 數據　${bniMeta.rawPeriod}`;
      headCols = RAW_DEFS.map(d => d.label);
      bodyFn = p => RAW_DEFS.map(d => `<td>${fmtCell(p.row[d.col], d)}</td>`).join('');
    } else if (activeTab === 'light') {
      subtitle.textContent = `${bniMeta.periodLabel}　${bniMeta.lightPeriod}`;
      headCols = [...LIGHT_DEFS.map(d => d.label), '總分/燈號'];
      bodyFn = p => LIGHT_DEFS.map(d => `<td>${fmtCell(p.row[d.col], d)}</td>`).join('')
        + `<td class="${p.light.cell}">${p.score} ${p.light.emoji}</td>`;
    } else {
      subtitle.textContent = `${bniMeta.actionLabel}（共 ${bniMeta.weeks} 週）`;
      headCols = ACTION_DEFS.map(d => d.label);
      bodyFn = p => ACTION_DEFS.map(d => {
        const g = p.gaps[d.key];
        return `<td class="${g.ok ? 'text-green-700' : 'text-red-700 font-semibold bg-red-50'}">${g.text}</td>`;
      }).join('');
    }

    const headHTML = `<th class="name-cell">比較</th><th class="name-cell">姓名</th>` +
      headCols.map(h => `<th>${h}</th>`).join('');

    const bodyHTML = people.map(p => `
      <tr>
        <td class="name-cell text-center"><input type="checkbox" class="member-check w-4 h-4 accent-green-700" data-name="${p.name}" ${selected.has(p.name) ? 'checked' : ''}></td>
        <td class="name-cell font-medium text-gray-800">${p.name}<span class="text-gray-400 text-[10px] block">#${p.id}</span></td>
        ${bodyFn(p)}
      </tr>`).join('');

    wrap.innerHTML = `<table class="sheet-table w-full"><thead><tr>${headHTML}</tr></thead><tbody>${bodyHTML}</tbody></table>`;

    document.querySelectorAll('.member-check').forEach(cb => {
      cb.addEventListener('change', () => {
        if (cb.checked) selected.add(cb.dataset.name);
        else selected.delete(cb.dataset.name);
        updateCompareBar();
      });
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === activeTab);
    });
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { activeTab = btn.dataset.tab; renderTable(); });
  });

  // ── 底部比較列 ────────────────────────────────────────────
  function updateCompareBar() {
    const bar = document.getElementById('compare-bar');
    document.getElementById('selected-count').textContent = selected.size;
    bar.classList.toggle('hidden', selected.size === 0);
  }

  document.getElementById('clear-selection').addEventListener('click', () => {
    selected.clear();
    renderTable();
    updateCompareBar();
    document.getElementById('compare-section').classList.add('hidden');
  });

  // ── 比較結果卡（沿用單人查詢頁的行動方案格式）──────────────
  function compareCardHTML(p) {
    const light = p.light;
    const rows = ACTION_DEFS.map(def => {
      const g = p.gaps[def.key];
      const cls = g.ok ? 'text-green-700' : 'text-red-700 font-semibold bg-red-50';
      return `<tr class="${g.ok ? '' : 'bg-red-50'}"><td class="px-3 py-2 text-gray-600 font-medium w-1/3">${def.label}</td><td class="px-3 py-2 ${cls}">${g.text}</td></tr>`;
    }).join('');

    return `
      <div class="bg-white border-2 border-gray-200 rounded-2xl overflow-hidden">
        <div class="text-center py-4 px-3">
          <p class="text-xs text-gray-500">#${p.id}</p>
          <p class="text-lg font-bold text-gray-800">${p.name}</p>
          <p class="text-3xl mt-1">${light.emoji}</p>
          <p class="font-bold mt-1">${light.label}・${p.score} / 100 分</p>
        </div>
        <div class="border-t border-gray-200 mx-3"></div>
        <div class="px-3 pt-3 pb-3">
          <p class="text-xs font-bold text-gray-500 mb-2">📋 ${bniMeta.actionLabel}（共 ${bniMeta.weeks} 週）</p>
          <div class="rounded-xl overflow-hidden border border-gray-200 bg-white">
            <table class="w-full text-sm"><tbody>${rows}</tbody></table>
          </div>
        </div>
      </div>`;
  }

  document.getElementById('do-compare').addEventListener('click', () => {
    const chosen = people.filter(p => selected.has(p.name));
    const section = document.getElementById('compare-section');
    document.getElementById('compare-cards').innerHTML = chosen.map(compareCardHTML).join('');
    section.classList.remove('hidden');
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  // ── 下載 JPG ──────────────────────────────────────────────
  // table-wrap 平常有 max-height + overflow-auto（畫面上只顯示一部分、可捲動），
  // 截圖前要先暫時取消捲動限制，不然 html2canvas 只會截到目前看得到的那一小段
  async function downloadAsImage(el, filenamePrefix) {
    const prevMaxHeight = el.style.maxHeight;
    const prevOverflow  = el.style.overflow;
    el.style.maxHeight = 'none';
    el.style.overflow  = 'visible';

    const canvas = await html2canvas(el, { backgroundColor: '#ffffff', scale: 2, useCORS: true });

    el.style.maxHeight = prevMaxHeight;
    el.style.overflow  = prevOverflow;

    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${filenamePrefix}_${bniMeta.month || ''}.jpg`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }, 'image/jpeg', 0.92);
  }

  document.getElementById('download-table').addEventListener('click', () => {
    const names = { raw: 'BNI五個月PALMS數據', light: 'BNI六個月燈號', action: 'BNI當月行動方案' };
    downloadAsImage(document.getElementById('table-wrap'), names[activeTab]);
  });

  document.getElementById('download-compare').addEventListener('click', () => {
    const chosen = people.filter(p => selected.has(p.name));
    const names = chosen.map(p => p.name).join('、');
    const prefix = chosen.length > 3
      ? `BNI比較_${chosen[0].name}等${chosen.length}人`
      : `BNI比較_${names}`;
    downloadAsImage(document.getElementById('compare-cards'), prefix);
  });

  // ── 啟動 ──────────────────────────────────────────────────
  loadData();
  </script>
</body>
</html>
